title: Watch Wise
description: Movie and TV discovery concept centered on an AI recommendation interface, with the focus on a polished browsing flow and stronger content suggestions. It is less about building a full platform and more about exploring how recommendation UX can feel clearer and more curated. The project gives room to experiment with interface quality, media browsing patterns, and AI-assisted product ideas.
